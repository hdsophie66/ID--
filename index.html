<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芬芳时 · 中医日课</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f3f0;
            font-family: system-ui, "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid #e0d9cc;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #556b2f;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .logo {
            font-weight: 600;
            color: #556b2f;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo span {
            font-size: 1.4em;
        }
        .date {
            color: #888;
            font-size: 0.9em;
            font-family: monospace;
        }
        .title {
            text-align: center;
            font-size: 1.6em;
            color: #2c3e2f;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .row {
            margin-bottom: 25px;
        }
        .label {
            font-size: 0.9em;
            color: #556b2f;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }
        .input {
            border-bottom: 1px dashed #ccc;
            min-height: 2.2em;
            padding: 6px 0;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .input:focus {
            outline: none;
            border-bottom-color: #ce93d8;
        }
        .input[contenteditable="true"]:empty:before {
            content: attr(placeholder);
            color: #aaa;
            font-style: italic;
        }
        .btn {
            background: #ffab91;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1.2em;
            border-radius: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 30px 0 20px;
            box-shadow: 0 6px 0 #d68c72;
            transition: 0.1s ease;
            cursor: pointer;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d68c72;
        }
        .footer {
            text-align: center;
            color: #aaa;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="card" id="captureCard">
        <div class="header">
            <div class="logo">
                <span>🌸</span> 芬芳时 · 中医日课
            </div>
            <div class="date" id="todayDate"></div>
        </div>
        <div class="title">📓 今日 · 尝药 / 刮痧 / 随手</div>

        <div class="row">
            <span class="label">📌 标题 / 药名</span>
            <div class="input" contenteditable="true" placeholder="例：桂枝 / 刮痧 / 艾灸"></div>
        </div>

        <div class="row">
            <span class="label">⚖️ 四气五味 / 部位</span>
            <div class="input" contenteditable="true" placeholder="温、辛、甘…… / 后背、小腿……"></div>
        </div>

        <div class="row">
            <span class="label">🌀 药势 / 反应</span>
            <div class="input" contenteditable="true" placeholder="气往哪走？身体什么感觉？"></div>
        </div>

        <div class="row">
            <span class="label">📝 备注 / 感受</span>
            <div class="input" contenteditable="true" placeholder="想写的都写在这儿"></div>
        </div>

        <button class="btn" onclick="saveCard()">📸 保存这张卡片</button>
        <div class="footer">每天一张 · 存进相册 · 就是你的笔记</div>
    </div>

    <script>
        document.getElementById('todayDate').innerText = new Date().toISOString().slice(0,10).replace(/-/g,'.');

        function saveCard() {
            const card = document.getElementById('captureCard');
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '⏳ 生成中...';
            btn.disabled = true;

            html2canvas(card, {
                scale: 2,
                backgroundColor: '#ffffff'
            }).then(canvas => {
                const imgWindow = window.open('');
                imgWindow.document.write(`
                    <html>
                        <head><title>长按保存图片 · 芬芳时</title></head>
                        <body style="margin:0; display:flex; justify-content:center; align-items:center; background:#f0f0f0;">
                            <img src="${canvas.toDataURL('image/png')}" style="max-width:100%; max-height:100vh; object-fit:contain;" />
                            <p style="position:fixed; bottom:20px; left:0; right:0; text-align:center; color:#666;">👆 长按图片保存到相册</p>
                        </body>
                    </html>
                `);
                btn.innerText = originalText;
                btn.disabled = false;
            }).catch(err => {
                alert('生成失败，试试截图吧');
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
