<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 芬芳时 · 尝药日志</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f3f0;
            font-family: system-ui, "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid #e0d9cc;
            /* 确保内部元素垂直排列 */
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #556b2f;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .logo {
            font-weight: 600;
            color: #556b2f;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo span {
            font-size: 1.4em;
        }
        .date {
            color: #888;
            font-size: 0.9em;
            font-family: monospace;
        }
        .section-core {
            background: #faf8f5;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #e2d9cc;
        }
        .row {
            margin-bottom: 18px;
        }
        .label {
            font-size: 0.9em;
            color: #556b2f;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            display: block;
        }
        .input {
            border-bottom: 1px dashed #bbb;
            min-height: 1.8em;
            padding: 5px 0;
            color: #333;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .input[contenteditable="true"]:empty:before {
            content: attr(placeholder);
            color: #aaa;
            font-style: italic;
        }
        .image-upload-area {
            margin-top: 10px;
        }
        .upload-btn {
            background: #e0d9cc;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #333;
            cursor: pointer;
        }
        .preview-image {
            max-width: 100%;
            max-height: 150px;
            margin-top: 10px;
            border-radius: 8px;
            display: block; /* 防止图片产生额外间隙 */
        }
        .toggle-btn {
            background: none;
            border: 1px solid #ccc;
            color: #556b2f;
            padding: 10px;
            width: 100%;
            border-radius: 30px;
            font-size: 1em;
            cursor: pointer;
            margin: 15px 0 10px;
            transition: 0.2s;
        }
        .toggle-btn:hover {
            background: #f0ebe4;
        }
        .section-life {
            background: #fffef9;
            border-radius: 20px;
            padding: 20px;
            border: 1px dashed #ce93d8;
            display: none;
            margin-top: 15px;
        }
        .section-life.show {
            display: block;
        }
        .life-row {
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        .life-label {
            color: #7b5e4b;
            font-weight: 500;
            margin-bottom: 3px;
        }
        .life-input {
            border-bottom: 1px dotted #ccc;
            min-height: 1.6em;
            padding: 4px 0;
            color: #333;
        }
        .life-input[contenteditable="true"]:empty:before {
            content: attr(placeholder);
            color: #aaa;
            font-style: italic;
        }
        /* 按钮样式 */
        .btn {
            background: #ffab91;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1.2em;
            border-radius: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 30px 0 20px; /* 上下间距 */
            box-shadow: 0 6px 0 #d68c72;
            transition: 0.1s ease;
            cursor: pointer;
            align-self: center; /* 确保居中 */
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d68c72;
        }
        .footer {
            text-align: center;
            color: #aaa;
            font-size: 0.8em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 卡片容器开始 -->
    <div class="card" id="captureCard">
        <div class="header">
            <div class="logo">
                <span>🌿</span> 芬芳时 · 尝药日志
            </div>
            <div class="date" id="todayDate"></div>
        </div>

        <!-- 第一层：尝药核心 -->
        <div class="section-core">
            <div class="row"><span class="label">👤 用户名</span><div class="input" contenteditable="true" placeholder="你的名字"></div></div>
            <div class="row"><span class="label">🌱 药名 / 方剂</span><div class="input" contenteditable="true" placeholder="如：桂枝汤"></div></div>
            <div class="row"><span class="label">⚖️ 四气五味 / 升降浮沉</span><div class="input" contenteditable="true" placeholder="温、辛、甘……"></div></div>
            <div class="row">
                <span class="label">🌀 药势 / 三焦图</span>
                <div class="input" contenteditable="true" placeholder="可写文字描述"></div>
                <div class="image-upload-area">
                    <button class="upload-btn" onclick="insertImage(this)">📎 插入图片</button>
                    <div class="image-preview"></div>
                </div>
            </div>
            <div class="row"><span class="label">📌 用药反应</span><div class="input" contenteditable="true" placeholder="服药后身体的感觉"></div></div>
            <div class="row"><span class="label">🕒 当下状态</span><div class="input" contenteditable="true" placeholder="今天整体的感受"></div></div>
            <div class="row">
                <span class="label">👅 舌苔情况</span>
                <div class="input" contenteditable="true" placeholder="颜色、厚薄、润燥、齿痕等"></div>
                <div class="image-upload-area">
                    <button class="upload-btn" onclick="insertImage(this)">📎 插入舌苔照片</button>
                    <div class="image-preview"></div>
                </div>
            </div>       
            <div class="row"><span class="label">📅 之前状态</span><div class="input" contenteditable="true" placeholder="服药前的状态"></div></div>
        </div>

        <!-- 折叠按钮 -->
        <button class="toggle-btn" onclick="toggleLifeSection()">📋 + 展开生活觉察（可填）</button>

        <!-- 第二层：生活觉察 -->
        <div class="section-life" id="lifeSection">
            <div class="life-row"><div class="life-label">🍚 日常饮食</div><div class="life-input" contenteditable="true" placeholder="今天吃了什么"></div></div>
            <div class="life-row"><div class="life-label">🚽 二便情况</div><div class="life-input" contenteditable="true" placeholder="大小便"></div></div>
            <div class="life-row"><div class="life-label">😴 睡眠情况</div><div class="life-input" contenteditable="true" placeholder="入睡、中间、醒来"></div></div>
            <div class="life-row"><div class="life-label">🏃 运动情况</div><div class="life-input" contenteditable="true" placeholder="今天动了没"></div></div>
            <div class="life-row"><div class="life-label">⏰ 易疲惫时间</div><div class="life-input" contenteditable="true" placeholder="什么时段觉得累"></div></div>
            <div class="life-row"><div class="life-label">✨ 轻快感时间</div><div class="life-input" contenteditable="true" placeholder="什么时段比较有精神"></div></div>
            <div class="life-row"><div class="life-label">📺 影视/书籍/心得</div><div class="life-input" contenteditable="true" placeholder="最近在看什么"></div></div>
            <div class="life-row">
                <div class="life-label">📓 日记/手帐</div>
                <div class="life-input" contenteditable="true" placeholder="今天想记点什么"></div>
                <div style="margin-top: 8px;">
                    <button class="upload-btn" onclick="insertImage(this)">📎 插入图片（画作）</button>
                    <div class="image-preview"></div>
                </div>
            </div>
            <div class="life-row"><div class="life-label">💬 用一句话形容自己，我最不可复制的是什么</div><div class="life-input" contenteditable="true" placeholder="你会怎么描述现在的你，和你最独特的部分"></div></div>
            <div class="life-row"><div class="life-label">🌄 有能力时想做什么</div><div class="life-input" contenteditable="true" placeholder="如果有更多能量，你想做什么"></div></div>
        </div>
    
        <div class="footer">每天一张 · 存进相册 · 就是你的药证笔记</div>
        
        <!-- ✅ 修复点：按钮已移入 card 容器内部，位于 footer 之后 -->
        <button class="btn" onclick="saveCard()">📸 保存这张卡片</button>
    </div>
    <!-- 卡片容器结束 -->

    <script>
        // 显示今天日期
        document.getElementById('todayDate').innerText = new Date().toISOString().slice(0,10).replace(/-/g,'.');

        function toggleLifeSection() {
            const section = document.getElementById('lifeSection');
            const btn = document.querySelector('.toggle-btn');
            if (section.classList.contains('show')) {
                section.classList.remove('show');
                btn.innerText = '📋 + 展开生活觉察（可填）';
            } else {
                section.classList.add('show');
                btn.innerText = '📋 - 收起生活觉察';
            }
        }
        function insertImage(btn) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'preview-image';
                    const previewDiv = btn.parentElement.querySelector('.image-preview');
                    previewDiv.innerHTML = '';
                    previewDiv.appendChild(img);
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

       function saveCard() {
            const card = document.getElementById('captureCard');
            const btn = event.target;
            
            // 简单的加载反馈
            const originalText = btn.innerText;
            btn.innerText = '生成中...';
            btn.style.opacity = '0.8';

            html2canvas(card, {
                scale: 2,
                backgroundColor: '#ffffff',
                useCORS: true // 允许跨域图片（如果有的话）
            }).then(canvas => {
                const imgWindow = window.open('');
                if (imgWindow) {
                    imgWindow.document.write(`
                        <html>
                            <head><title>长按保存图片 · 芬芳时</title><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
                            <body style="margin:0; display:flex; justify-content:center; align-items:center; background:#f0f0f0; min-height:100vh;">
                                <img src="${canvas.toDataURL('image/png')}" style="max-width:100%; max-height:100vh; object-fit:contain;" />
                                <p style="position:fixed; bottom:20px; left:0; right:0; text-align:center; color:#666; font-family:sans-serif;">👆 长按图片保存到相册</p>
                            </body>
                        </html>
                    `);
                } else {
                    alert('无法自动打开新窗口，请检查浏览器设置');
                }
                
                // 恢复按钮状态
                btn.innerText = originalText;
                btn.style.opacity = '1';
            }).catch(err => {
                console.error(err);
                alert('生成失败，请重试');
                btn.innerText = originalText;
                btn.style.opacity = '1';
            });
        }
    </script>
</body>
</html>
